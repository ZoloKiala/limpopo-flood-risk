name: Publish dashboard to Pages

# Publishes a dated archive of dashboards to GitHub Pages. Each run:
#   * carries forward the days already published (so history accumulates),
#   * backfills any missing day in the recent window (reconstructing past days
#     from Open-Meteo's historical-forecast archive + nearest Sentinel-1 scene),
#   * rebuilds the manifest + index and deploys.
# Runs after each successful "Daily flood risk" run, and on manual dispatch.

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: "Re-render every snapshot (recent window + events) with the current templates"
        type: boolean
        default: false
  workflow_run:
    workflows: ["Daily flood risk"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  SITE_URL: https://zolokiala.github.io/limpopo-flood-risk
  BACKFILL_DAYS: "14"
  REGIONS: "lower_limpopo caprivi"
  # Fixed historical flood events per region (Cyclone Freddy's first Mozambique
  # landfall, Feb 2023, over the Limpopo reach). Caprivi has none pinned yet.
  EVENTS_lower_limpopo: "2023-02-24 2023-02-25 2023-02-26 2023-02-27 2023-02-28 2023-03-01 2023-03-02"
  EVENTS_caprivi: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # cold-cache build does the full mosaic + SAR
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore static products (susceptibility + thresholds + SAR model)
        uses: actions/cache@v4
        with:
          path: static
          key: static-v1-${{ github.run_id }}
          restore-keys: |
            static-v1

      - name: Build static products if missing (cold cache only, per region)
        run: |
          for R in $REGIONS; do
            python -m floodrisk build-static --region "$R" --if-missing
          done

      - name: Assemble each region (carry-forward + backfill + build-site)
        run: |
          FULL="${{ github.event.inputs.full_rebuild }}"
          TOMORROW=$(date -u -d "tomorrow" +%Y-%m-%d)
          mkdir -p _site
          for R in $REGIONS; do
            RS="_site/$R"; mkdir -p "$RS"
            # carry forward already-published days for this region
            if [ "$FULL" != "true" ] && curl -sf "$SITE_URL/$R/manifest.json" -o /tmp/m.json; then
              for d in $(python -c "import json;print('\n'.join(json.load(open('/tmp/m.json')).get('dates',[])))"); do
                curl -sf "$SITE_URL/$R/$d.html" -o "$RS/$d.html" && echo "carried $R/$d" || rm -f "$RS/$d.html"
              done
            fi
            # desired dates: recent window + region-specific flood events
            DATES=""
            for i in $(seq 0 "$BACKFILL_DAYS"); do
              DATES="$DATES $(date -u -d "$TOMORROW -${i} days" +%Y-%m-%d)"
            done
            eval "EV=\${EVENTS_$R:-}"
            DATES="$DATES $EV"
            for D in $DATES; do
              if [ -f "$RS/$D.html" ]; then
                echo "have $R/$D"
              else
                echo "building $R/$D"
                python -m floodrisk daily --region "$R" --for "$D" || echo "  (skipped $R/$D)"
              fi
            done
            python -m floodrisk build-site --region "$R" --site _site
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
