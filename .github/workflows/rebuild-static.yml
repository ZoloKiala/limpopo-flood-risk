name: Rebuild static products

# Manual trigger: retrains the susceptibility ViT + the Sen1Floods11 SAR ViT
# and recomputes rainfall thresholds, then refreshes the cache used by the
# daily workflow. Run after changing config (window, thresholds, model) or to
# refresh GSW/CHIRPS-derived products (annual is plenty).

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Which product to (re)build (others are restored from cache)"
        type: choice
        options: [all, susceptibility, thresholds, sar, discharge]
        default: all
      region:
        description: "Which study region to build"
        type: choice
        options: [lower_limpopo, caprivi]
        default: lower_limpopo

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # mosaic (4 DEM tiles) + SAR training
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore existing static products (partial rebuild keeps the rest)
        if: ${{ github.event.inputs.component != '' && github.event.inputs.component != 'all' }}
        uses: actions/cache/restore@v4
        with:
          path: static
          key: static-restore-${{ github.run_id }}
          restore-keys: |
            static-v1

      - name: Build static products
        run: |
          C="${{ github.event.inputs.component }}"
          R="${{ github.event.inputs.region }}"
          R="${R:-lower_limpopo}"
          if [ -n "$C" ] && [ "$C" != "all" ]; then
            echo "rebuilding only: $C (region $R)"
            python -m floodrisk build-static --region "$R" --only "$C"
          else
            echo "full rebuild (region $R)"
            python -m floodrisk build-static --region "$R"
          fi

      - name: Save to cache
        uses: actions/cache/save@v4
        with:
          path: static
          key: static-v1-${{ github.run_id }}

      - name: Upload static products as artifact (audit copy)
        uses: actions/upload-artifact@v4
        with:
          name: static-products-${{ github.run_id }}
          path: static/
          retention-days: 90
